version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: predixroute-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-predixroute}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-predixroute_dev}
      MONGO_INITDB_DATABASE: predixroute
    volumes:
      - mongodb_data:/data/db
      - ./infrastructure/docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: predixroute-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../infrastructure/docker/Dockerfile.backend
    container_name: predixroute-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-predixroute}:${MONGO_ROOT_PASSWORD:-predixroute_dev}@mongodb:27017/predixroute?authSource=admin
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ai-service:8000
      AI_SERVICE_INTERNAL_TOKEN: ${AI_SERVICE_INTERNAL_TOKEN:-dev_internal_token_min_16}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_access_secret_change_in_prod_min32chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret_change_in_prod_min32chars}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      DATASET_ROOT: /data/datasets
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./data/datasets:/data/datasets

  worker:
    build:
      context: ./backend
      dockerfile: ../infrastructure/docker/Dockerfile.backend
    container_name: predixroute-worker
    restart: unless-stopped
    command: npm run start:worker
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-predixroute}:${MONGO_ROOT_PASSWORD:-predixroute_dev}@mongodb:27017/predixroute?authSource=admin
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ai-service:8000
      AI_SERVICE_INTERNAL_TOKEN: ${AI_SERVICE_INTERNAL_TOKEN:-dev_internal_token_min_16}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_access_secret_change_in_prod_min32chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret_change_in_prod_min32chars}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./data/datasets:/data/datasets

  ai-service:
    build:
      context: ./ai-service
      dockerfile: ../infrastructure/docker/Dockerfile.ai-service
    container_name: predixroute-ai-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      INTERNAL_TOKEN: ${AI_SERVICE_INTERNAL_TOKEN:-dev_internal_token_min_16}
      MODEL_VERSION: 1.0.0
      REDIS_URL: redis://redis:6379
      DATASET_ROOT: /data/datasets
      BOOTSTRAP_MODEL_ON_STARTUP: "true"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./ai-service:/app
      - ai_models:/app/models
      - ./data/datasets:/data/datasets

  frontend:
    build:
      context: ./frontend
      dockerfile: ../infrastructure/docker/Dockerfile.frontend
    container_name: predixroute-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:3000/api/v1
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  nginx:
    image: nginx:1.25-alpine
    container_name: predixroute-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - backend
      - frontend
      - ai-service

volumes:
  mongodb_data:
  redis_data:
  ai_models:
